<main>

    <section class="products">
        
        <!-- En tu archivo de contacto, busca el formulario y asegúrate que tenga estos 'name' -->
    <form class="product-card" id="contact-form">
        <h3>Envíanos un mensaje</h3>

        <label>Nombre</label>
        <input type="text" name="nombre" placeholder="Tu nombre" required>

        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="correo@email.com" required>

        <label>Mensaje</label>
        <textarea name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit" id="submit-btn">Enviar mensaje</button>
        <p id="respuesta"></p>
    </form>
        
        <!-- informacion de contacto, el numero es falso por si akaso -->
        <div class="product-card">
            <h3>Información</h3>
            <p><strong> Dirección:</strong> SAN PEDRO DE MACORIS, RD</p>
            <p><strong> Teléfono:</strong> 809-123-4567</p>
            <p><strong> Email:</strong> thesweetjoy@gmail.com</p>
            <p><strong> Horario:</strong> Lun - Sáb / 9:00 AM - 7:00 PM</p>
        </div>

    </section>
